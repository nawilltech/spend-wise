## Render Blueprint — SpendWise
## Docs: https://render.com/docs/blueprint-spec
##
## Deploy:  connect this repo in the Render dashboard and it reads this file.
## Secrets: any envVar with sync:false must be set manually in the dashboard.

services:
  # ── API web service ────────────────────────────────────────────────
  - type: web
    name: spendwise-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      # Set these manually in the Render dashboard after first deploy:
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://spendwise.app,https://www.spendwise.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@spendwise.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPEN_EXCHANGE_RATES_APP_ID
        sync: false

  # ── Celery worker ──────────────────────────────────────────────────
  - type: worker
    name: spendwise-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    branch: main
    autoDeploy: true
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: spendwise-api
          type: web
          envVarKey: SECRET_KEY
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPEN_EXCHANGE_RATES_APP_ID
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────
  - type: redis
    name: spendwise-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # internal only — only reachable by other Render services

# ── PostgreSQL ─────────────────────────────────────────────────────
databases:
  - name: spendwise-db
    databaseName: spendwise
    user: spendwise
    plan: free
